<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>sandbox</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      max-width: 100%;
    }
    canvas#canvas {
      display: block;
      width: 1280px;
      height: 720px;
      max-width: 100%;
      max-height: 100%;
    }
    header, footer {
      font-family: sans-serif;
      font-size: 15px;
      color: #aaa;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    header a, footer a {
      color: #ddd;
      text-decoration: none;
    }
    header a:hover, footer a:hover {
      color: #fff;
      text-decoration: underline;
    }
    header span { color: #fff; font-weight: 600; }
  </style>
</head>
<body>
  <div id="wrapper">
    <header>
      <span>3D Sandbox</span>
      <span>—</span>
      <span>by <a href="https://github.com/AnimatorJeroen" target="_blank" rel="noopener">AnimatorJeroen</a></span>
    </header>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <footer>
      <a href="https://github.com/AnimatorJeroen/sandbox" target="_blank" rel="noopener">github.com/AnimatorJeroen/sandbox</a>
    </footer>
  </div>
  <script type="text/javascript">
    var Module = {
      canvas: (function() { return document.getElementById('canvas'); })()
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
